version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: walletwhisper-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: walletwhisper
      POSTGRES_PASSWORD: walletwhisper_dev_pass
      POSTGRES_DB: walletwhisper
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletwhisper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
